services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: onrecord
      POSTGRES_PASSWORD: onrecord
      POSTGRES_DB: onrecord
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U onrecord"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

  ingest:
    build:
      context: .
      dockerfile: Dockerfile
    command: node apps/ingest/dist/server.js
    env_file: .env
    environment:
      DATABASE_URL: postgres://onrecord:onrecord@postgres:5432/onrecord
      REDIS_URL: redis://redis:6379
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    command: node apps/ingest/dist/worker.js
    env_file: .env
    environment:
      DATABASE_URL: postgres://onrecord:onrecord@postgres:5432/onrecord
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    env_file: .env
    environment:
      API_URL: http://ingest:3001
      NEXT_PUBLIC_API_URL: http://localhost:3001
    ports:
      - "3000:3000"
    depends_on:
      - ingest

volumes:
  pgdata:
  redisdata:
