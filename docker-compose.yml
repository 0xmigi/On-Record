services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: onrecord
      POSTGRES_PASSWORD: onrecord
      POSTGRES_DB: onrecord
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U onrecord"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

  # Single-process live path: API + poller + cron, pipeline inline (matches the
  # Railway deploy). For the queued alternative, run `server.js` + `worker.js`
  # as two services against redis instead.
  live:
    build:
      context: .
      dockerfile: Dockerfile
    command: node apps/ingest/dist/live.js
    env_file: .env
    environment:
      DATABASE_URL: postgres://onrecord:onrecord@postgres:5432/onrecord
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    env_file: .env
    environment:
      API_URL: http://live:3001
      NEXT_PUBLIC_API_URL: http://localhost:3001
    ports:
      - "3000:3000"
    depends_on:
      - live

volumes:
  pgdata:
  redisdata:
