# Curated program → entity labels, seeded into the entities table.
# DeFiLlama mappings and operator naming do the rest. slugs must be unique.
#
# The "landmarks" below exist for a specific reason: the index is built from
# loader events, so a program that has not deployed or upgraded inside our
# window has no subject row at all, and one that never leaks a name (no
# security.txt, no `programs/<name>/src/` panic path) has a row with a null
# name. Both are unfindable by search. SPL Token was the worst case — the most
# invoked program on Solana, indexed, and nameless. A registry name outranks
# every other naming source, so listing an id here is what makes it findable.
#
# seed-landmarks.ts consumes this file: it names existing rows and ingests the
# ones that have no row yet.
